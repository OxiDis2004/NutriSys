server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: server-logs
    static_configs:
      - targets:
          - localhost
        labels:
          service: server
          __path__: /logs/server/*.log

  - job_name: bot-logs
    static_configs:
      - targets:
          - localhost
        labels:
          service: telegram-bot
          __path__: /logs/bot/*.log