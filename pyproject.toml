[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py313"
extend-exclude = [
    ".git",
    ".idea",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    "dist",
    "build",
    "server/.42c",
    "server/openapi",
    "server/postman",
    "dynamic-det",
    "web"
]

[tool.ruff.lint]
fixable = ["ALL"]
unfixable = ["B"]
select = [
    "E", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I"     # isort
]
# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "E402"]
"test/**/*.py" = ["S101", "E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
